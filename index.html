<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f6f5f1" />
    <title>Design Archive</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="wordmark" href="./">DESIGN<br />ARCHIVE</a>
      <p class="header-note">UI · Brand · AI · Visual</p>
      <p class="header-date" id="today"></p>
    </header>
    <main>
      <section class="intro">
        <p class="eyebrow" id="intro-eyebrow">CURATED DAILY</p>
        <h1 id="intro-title">좋은 화면은<br />좋은 관찰에서 시작된다.</h1>
        <p class="intro-copy" id="intro-copy">웹·앱 UI, 브랜드, AI, 비주얼 그래픽을 실무 관점에서 수집합니다. 썸네일을 누르면 원본 레퍼런스로 이동합니다.</p>
      </section>
      <section class="toolbar" aria-label="아카이브 검색">
        <div class="search-shell">
          <span class="search-icon" aria-hidden="true"></span>
          <label class="sr-only" for="archive-search">레퍼런스 검색</label>
          <input id="archive-search" type="search" placeholder="제목, 태그, 메모 검색" autocomplete="off" />
          <kbd aria-hidden="true">/</kbd>
          <button class="search-clear" id="search-clear" type="button" aria-label="검색어 지우기">지우기</button>
        </div>
      </section>
      <nav class="archive-navigation" aria-label="아카이브 보기와 분야 필터">
        <div class="view-switcher" aria-label="콘텐츠 보기">
          <button type="button" data-view="archive" aria-pressed="true">레퍼런스</button>
          <button type="button" data-view="news" aria-pressed="false">디자인 뉴스</button>
        </div>
        <div class="filters" id="filters"></div>
        <p id="count" class="count" aria-live="polite"></p>
      </nav>
      <section id="archive" class="archive-grid" aria-live="polite"></section>
      <section id="news" class="news-list" aria-live="polite" hidden></section>
      <section id="empty-state" class="empty-state" hidden>
        <p class="empty-code">NO MATCH / 404</p>
        <h2>찾는 레퍼런스가 없습니다.</h2>
        <p>검색어를 줄이거나 다른 카테고리를 선택해 보세요.</p>
        <button id="reset-search" type="button">전체 목록으로 돌아가기</button>
      </section>
    </main>
    <template id="card-template">
      <article class="reference-card">
        <a class="thumbnail-link" target="_blank" rel="noreferrer" aria-label="원본 레퍼런스 열기">
          <div class="visual" aria-hidden="true">
            <span class="visual-index"></span>
            <span class="thumbnail-category"></span>
            <span class="visual-shape shape-one"></span>
            <span class="visual-shape shape-two"></span>
            <span class="visual-label"></span>
          </div>
        </a>
        <div class="card-body">
          <div class="card-topline"><span class="category"></span><span class="date"></span></div>
          <h2></h2>
          <p class="summary"></p>
          <p class="designer-note"></p>
          <div class="prompt-block">
            <p class="prompt"></p>
            <button class="copy-prompt" type="button">프롬프트 복사</button>
          </div>
          <ul class="tags"></ul>
        </div>
      </article>
    </template>
    <template id="news-template">
      <article class="news-card">
        <a class="news-thumbnail" target="_blank" rel="noreferrer"><img alt="" loading="lazy" /></a>
        <div class="news-content">
          <div class="news-meta"><span class="news-topic"></span><span class="news-source"></span><time></time></div>
          <h2><a target="_blank" rel="noreferrer"></a></h2>
          <p class="news-summary"></p><p class="news-impact"></p><ul class="tags"></ul>
        </div>
        <a class="news-arrow" target="_blank" rel="noreferrer" aria-label="원문 읽기">↗</a>
      </article>
    </template>
    <script src="data/references.js"></script>
    <script src="data/news.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
